<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guestbook — api.shuuino.party</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; max-width: 760px; }
    h1, h2 { margin-bottom: 12px; }
    form { display: grid; gap: 12px; margin-bottom: 24px; }
    label { display: grid; gap: 6px; font-size: 0.95rem; }
    input, textarea, button { font: inherit; }
    textarea { min-height: 120px; width: 100%; resize: vertical; }
    input { width: 100%; padding: 10px; }
    button { width: fit-content; padding: 10px 16px; cursor: pointer; }
    .comment { border: 1px solid #ddd; padding: 14px; border-radius: 10px; margin-bottom: 14px; }
    .comment-header { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .comment-name { font-weight: 700; }
    .comment-time { color: #666; font-size: 0.88rem; }
    #load-more { margin-top: 8px; }
    #status { color: #b00; min-height: 1.2rem; }
  </style>
</head>
<body>
  <h1>Guestbook</h1>
  <p>Leave a comment and see the latest visitor messages. Name is optional.</p>

  <form id="guestbook-form">
    <label>
      Name (optional)
      <input id="name" name="name" placeholder="anonymous" />
    </label>
    <label>
      Message
      <textarea id="message" name="message" required placeholder="Write something..." /></textarea>
    </label>
    <button type="submit">Send comment</button>
    <div id="status"></div>
  </form>

  <section>
    <h2>Latest comments</h2>
    <div id="comments"></div>
    <button id="load-more" type="button" hidden>Load more</button>
  </section>

  <script src="guestbook.js"></script>
</body>
</html>
